<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Calculadora Ruidos</title>


    <script type="text/javascript" src="html2pdf.bundle.js"></script>
    

    <link type="text/css" rel="stylesheet" href="materialize.css"  media="screen,projection"/>
    <link href="bastrap.css" rel="stylesheet">
    <link href="site.css" rel="stylesheet">
    <link href="calculadora.css" rel="stylesheet">

</head>

<body>
	
<div class="container" id="makepdf">
   
	<button onclick="window.location.reload()" type="button" class="btn btn-lg btn-info">Actualizar</button>
	
<h2>
    <img src="logo.jpeg" alt="Logo">
    <span>Calculadora de Ruidos</span>
</h2>
   
    <table>
        

        <tr>
            <!-- <td><label for="fecha">Domicilio :</label></td> -->
            <!-- <td><textarea name="domicilio" id="domicilio"></textarea></td> -->
        </tr>
        <tr>
            <td><label>Decibelimetro (nro serie): </label></td>
            <td>
                
                
                         
            <div class="input-field col s12">
                <select id="decibelimetro">
                    <option value="0">Seleccione...</option>
		    <option value="1314513">1314513</option>
		    <option value="1314511">1314511</option>
		    <option value="1314512">1314512</option>
			<hr>
                    <option value="2702171">2702171</option>
                    <option value="106451">106451</option>
                    <option value="43438">43438</option>
                    <option value="2456890">2456890</option>
                    <option value="116448">116448</option>
                    <option value="2456892">2456892</option>
                    <option value="2456897">2456897</option>
                    <option value="2456898">2456898</option>
                    <option value="106450">106450</option>
                    <option value="106447">106447</option>
		    <option value="106447">1314514</option>
                </select>
            </div>
            
            
            </td>

        </tr>
        <tr>
            <td><label for="fecha">Fecha:</label></td>
            <td><input type="text" name="fecha" id="fecha"  class="datepicker"></td>
        </tr>
        <tr>
            <td><label for="horario">Horario:</label></td>
            <td><input type="time" name="horario" id="horario"></td>
        </tr>
        <tr>
            <td><label for="horario">Periodo:</label>

            </td>
            <td>
                <label id="periodolbl"></label>
            </td>
        </tr>
        <tr>
            <td><label>Zona: </label></td>
            <td><select id="zona">
                    <option value="0">Seleccione...</option>
                    <option value="1">I (CbRb)</option>
                    <option value="2">II (APP/1, Rm1 / 4, Rma2, Rma4, Rma5, Rma1, CR1)</option>
                    <option value="3">III (APP/2, Cmb1, Cm1, Cm4, Cm5, Cma, Ca1)</option>
                    <option value="4">IV (CmbB, Cmb3, Cm3, Rmb3, Rm3, Rma3)</option>
                    <option value="5">V (Cm2, CE1)</option>
                    <option value="6">VI (IN)</option>
                    <option value="7">VII (ID, IE)</option>
                    <option value="8">VIII (IP)</option>
                    <option value="9">IX (Zonas de AC, Cercano a arterias principales)</option>
                </select></td>
        </tr>
        <tr>
            <td><label>Ambiente: </label></td>
            <td><select id="ambiente">
                    <option value="0">Seleccione...</option>
                    <option value="interior">Interior</option>
                    <option value="exterior">Exterior</option>
                </select></td>
        </tr>
        <tr>
            <td></td>
            	
		<td>
		    <button data-html2canvas-ignore="true" id="validarPaso1" onclick="validarPaso1()" type="button" class="btn btn-lg btn-primary">Validar Paso 1</button>
		</td>
		
        </tr>

        <tr style="display: none" id="btnp2">
            <td></td>
		
		<td>
		    <button data-html2canvas-ignore="true" id="validarPaso2Ext" onclick="validarPaso2Ext()" type="button" class="btn btn-lg btn-primary">Validar Paso 2</button>
		</td>
        </tr>
        <tr style="display: none" id="asalbl">
            <td><label>ASA: </label></td>
            <td><select id="asa" onchange="validaASA()">
                    <option value="0">Seleccione</option>
                    <option value="6">Tipo VI</option>
                    <option value="7">Tipo VII</option>
                </select></td>
        </tr>
        <tr style="display: none" id="recintolbl">
            <td><label>Recinto: </label></td>
            <td><select id="recinto">
                    <option value="HAB">Habitable</option>
                    <option value="SER">Servicio</option>
                    <option value="SLVP">Servicio Lindero Via Publica</option>
                </select></td>
        </tr>
        <tr style="display: none" id="usolbl">
            <td><label>Uso: </label></td>
            <td><select id="uso">
                    <option value="SAN">Sanidad</option>
                    <option value="ENS">Ensenanza</option>
                    <option value="CUL">Cultural</option>
                    <option value="OFI">Oficina</option>
                    <option value="COM">Comercios</option>
                    <option value="IND">Industria</option>
                </select></td>
        </tr>
        <tr style="display: none" id="btnp2i">
            <td></td>
            <td>
		 <button data-html2canvas-ignore="true" id="validarPaso2Int" onclick="validarPaso2Int()" type="button" class="btn btn-lg btn-primary">Validar Paso 2</button>  
		    
		
		</td>
        </tr>
        <tr>
            <td><label id="lmplbld">LMP: </label><br><label id="lmplblm7d">
                </label></td>
            <td>
                <label id="lmplbl" class="hide"></label><br><label id="lmplblm7v"></label>
            </td>
        </tr>

        <tr style="display: none; background-color:#ccc ; font-weight: bold;" id="monlblt">
            <td><label>FUENTE ON</label></td>
            <td><label id="resultadolmon"></label>
            </td>
        </tr>
        <tr style="display: none" id="monm1">
            <td><label>Med On - 1</label></td>
            <td><input type="number" name="m1on" id="m1on" step="0.01"></td>
        </tr>
        <tr style="display: none" id="monm2">
            <td><label>Med On - 2</label></td>
            <td><input type="number" name="m2on" id="m2on" step="0.01"></td>
        </tr>
        <tr style="display: none" id="monm3">
            <td><label>Med On - 3</label></td>
            <td><input type="number" name="m3on" id="m3on" step="0.01"></td>
        </tr>
        <tr style="display: none; background-color:#ccc ; font-weight: bold;" id="mofflblt">
            <td><label>FUENTE OFF</label></td>
            <td><label id="resultadolmoff"></label></td>
        </tr>
        <tr style="display: none" id="moffm1">
            <td><label>Med Off - 1</label></td>
            <td><input type="number" name="m1off" id="m1off" step="0.01"></td>
        </tr>
        <tr style="display: none" id="moffm2">
            <td><label>Med Off - 2</label></td>
            <td><input type="number" name="m2off" id="m2off" step="0.01"></td>
        </tr>
        <tr style="display: none" id="moffm3">
            <td><label>Med Off - 3</label></td>
            <td><input type="number" name="m3off" id="m3off" step="0.01"></td>
        </tr>
        <tr style="display: none" id="btncalcr">
            
           	
		<td>
		<button data-html2canvas-ignore="true" id="calcularRuido" onclick="calcularRuido()" type="button" class="btn btn-info btn-primary">Calcular Nivel Ruido</button>
		</td>
		
		<td>
		
		</td>
		
        </tr>
	    
	  	
		
	    
        <tr>
            <td colspan="2">
                <label id="lbllmlf"></label>
            </td>
        </tr>
        <tr>
            <td colspan="2">
                <label id="lblle"></label>
            </td>
        </tr>
        <tr>
            <td colspan="2">
        
		    
		    <label id="calculoruido">
	
		  </label>
		    
		    
            </td>
        </tr>
	    
	    <tr style="display: none" id="btnImprimir">
            <td></td>
		
		<td>

            
		    <button data-html2canvas-ignore="true" id="botonPDF" type="button" class="btn btn-lg btn-default" >Imprimir Resultado en PDF</button>
		</td>
        </tr>
	    
    </table>




</div>



<script data-require="jquery@1.12.4" data-semver="1.12.4" src="jquery.min.js"></script>
<script type="text/javascript" src="calc-ruidoV2.js"></script>
<script type="text/javascript" src="materialize.min.js"></script>



    


<script>


$(document).ready(function(){
    $('.datepicker').datepicker(
        {
            format: 'yyyy-mm-dd',
            defaultDate: 'now',
            autoClose: true
        }

    );
  });
       

// Funcion mostrar LPM al calcular
$('#calcularRuido').on('click', function(){
    $('#lmplbl').removeClass('hide');
});
	


</script>
           

<script>

M.AutoInit();

</script>
	
	
<script>

        var button = document.getElementById("botonPDF");
        var makepdf = document.getElementById("makepdf");
  
        button.addEventListener("click", function () {
           
            html2pdf().from(makepdf).save();
            
        });

</script>

	
	
</body>

</html>
